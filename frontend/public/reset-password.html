<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/site-theme.css">
  <style>
    body { 
      height: 100vh; 
      display: flex; 
      justify-content: center; 
      align-items: center; 
      background: linear-gradient(135deg,#667eea,#764ba2); 
    }
    .login-box { 
      background:#fff; 
      padding:30px; 
      border-radius:12px; 
      width:100%; 
      max-width:380px; 
      box-shadow:0 15px 35px rgba(0,0,0,0.3); 
    }
  </style>
  <script src="/js/api-config.js"></script>
</head>
<body>
  <div class="login-box">
    <h3 class="text-center mb-4">Reset Password</h3>
    <div id="alert" class="alert d-none"></div>
    <form id="resetForm">
      <div class="mb-3">
        <label>New Password</label>
        <input type="password" id="password" class="form-control" autocomplete="new-password" required />
      </div>
      <div class="mb-3">
        <label>Confirm Password</label>
        <input type="password" id="confirm" class="form-control" autocomplete="new-password" required />
      </div>
      <button id="submitBtn" class="btn btn-primary w-100" type="submit">Reset Password</button>
    </form>
  </div>

  <script>
    const form = document.getElementById('resetForm');
    const alertBox = document.getElementById('alert');
    const submitBtn = document.getElementById('submitBtn');

    // Get token from URL
    const params = new URLSearchParams(window.location.search);
    const token = params.get('token');

    // If no token, show error and disable form
    if (!token) {
      alertBox.className = 'alert alert-danger';
      alertBox.textContent = 'Invalid or missing token. Please request a new reset link.';
      form.style.display = 'none';
      submitBtn.disabled = true;
    }

    form.addEventListener('submit', async e => {
      e.preventDefault();
      alertBox.className = 'alert d-none';
      submitBtn.disabled = true;

      const password = document.getElementById('password').value.trim();
      const confirm = document.getElementById('confirm').value.trim();

      // Check passwords match
      if (password !== confirm) {
        alertBox.className = 'alert alert-danger';
        alertBox.textContent = 'Passwords do not match';
        submitBtn.disabled = false;
        return;
      }

      // Minimum password length
      if (password.length < 6) {
        alertBox.className = 'alert alert-danger';
        alertBox.textContent = 'Password must be at least 6 characters';
        submitBtn.disabled = false;
        return;
      }

      try {
        const res = await fetch(window.apiUrl('/admin/reset-password'), {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, password })
        });

        const data = await res.json();

        // Handle backend errors
        if (!res.ok || !data.success) throw new Error(data.message || 'Error resetting password');

        alertBox.className = 'alert alert-success';
        alertBox.textContent = data.message || '✅ Password reset successfully! Redirecting...';
        form.reset();

        setTimeout(() => window.location.href = '/admin-dashboard', 3000);

      } catch (err) {
        alertBox.className = 'alert alert-danger';
        alertBox.textContent = err.message;
      } finally {
        submitBtn.disabled = false;
      }
    });
  </script>
  <script src="/js/nav-active.js"></script>
</body>
</html>
