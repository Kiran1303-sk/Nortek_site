<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Panel Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/site-theme.css">
  <style>
    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #667eea, #764ba2);
    }
    .login-box {
      background: #fff;
      padding: 30px;
      border-radius: 12px;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
    }
  </style>
  <script src="/js/api-config.js"></script>
</head>
<body>
  <div class="login-box">
    <h3 class="text-center mb-2">Admin Panel Login</h3>
    <p class="text-center text-muted small mb-4">For Super Admin, Admin, Recruiter and User accounts</p>
    <div id="alert" class="alert d-none"></div>
    <form id="loginForm">
      <div class="mb-3">
        <label>Email</label>
        <input type="email" id="email" class="form-control" autocomplete="username" required />
      </div>
      <div class="mb-3">
        <label>Password</label>
        <input type="password" id="password" class="form-control" autocomplete="current-password" required />
      </div>
      <div class="text-end mt-2">
        <a href="/forgot-password.html" class="small">Forgot Password?</a>
      </div>
      <button id="loginBtn" class="btn btn-primary w-100" type="submit">Login</button>
    </form>
    
  </div>

<script>
window.location.replace('/admin-dashboard.html');

const form = document.getElementById('loginForm');
const alertBox = document.getElementById('alert');
const loginBtn = document.getElementById('loginBtn');

form.addEventListener('submit', async e => {
  e.preventDefault();
  alertBox.className = 'alert d-none';
  loginBtn.disabled = true;

  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value.trim();

  try {
    const res = await fetch(window.apiUrl('/admin/login'), {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });

    const data = await res.json();
    if (!res.ok || !data.success) throw new Error(data.message || 'Login failed');

    localStorage.removeItem('candidate_token');
    localStorage.removeItem('candidate_user');
    localStorage.setItem('admin_token', data.token);
    localStorage.setItem('admin_user', JSON.stringify(data.user || null));

    alertBox.className = 'alert alert-success';
    alertBox.textContent = '[OK] Login successful! Redirecting...';

    setTimeout(() => window.location.href = '/admin-dashboard.html', 1500);

  } catch (err) {
    alertBox.className = 'alert alert-danger';
    alertBox.textContent = err.message;
    document.getElementById('password').value = '';
  } finally {
    loginBtn.disabled = false;
  }
});
</script>
  <script src="/js/nav-active.js"></script>
    <script src="/js/quality-boost.js" defer></script>
  </body>
</html>
