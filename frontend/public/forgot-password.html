<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Forgot Password</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/site-theme.css">
  <style>
    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg,#667eea,#764ba2);
    }
    .login-box {
      background:#fff;
      padding:30px;
      border-radius:12px;
      width:100%;
      max-width:380px;
      box-shadow:0 15px 35px rgba(0,0,0,0.3);
    }
  </style>
  <script src="/js/api-config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
</head>
<body>
  <div class="login-box">
    <h3 class="text-center mb-4">Forgot Password</h3>
    <div id="alert" class="alert d-none"></div>
    <form id="forgotForm">
      <div class="mb-3">
        <label>Email</label>
        <input type="email" id="email" class="form-control" autocomplete="email" required />
      </div>
      <button id="submitBtn" class="btn btn-primary w-100" type="submit">Send OTP</button>
    </form>
    <div class="mt-3 text-center">
      <a href="/admin-dashboard.html">Back to login</a>
    </div>
  </div>

<script>
const form = document.getElementById('forgotForm');
const alertBox = document.getElementById('alert');
const submitBtn = document.getElementById('submitBtn');

const BACKEND_URL = window.__API_BASE__;

form.addEventListener('submit', async e => {
  e.preventDefault();
  alertBox.className = 'alert d-none';
  submitBtn.disabled = true;

  const email = document.getElementById('email').value.trim();

  try {
    const { data } = await axios.post(`${BACKEND_URL}/admin/forgot-password/request-otp`, { email });
    if (!data.success) throw new Error(data.message || 'Error sending OTP');

    alertBox.className = 'alert alert-success';
    alertBox.textContent = data.message || 'OTP sent. Continue in admin login screen.';
    form.reset();

    setTimeout(() => window.location.href = '/admin-dashboard.html', 2000);

  } catch(err) {
    const message = err.response?.data?.message || err.message;
    alertBox.className = 'alert alert-danger';
    alertBox.textContent = message;
  } finally {
    submitBtn.disabled = false;
  }
});
</script>
  <script src="/js/nav-active.js"></script>
    <script src="/js/quality-boost.js" defer></script>
  </body>
</html>
