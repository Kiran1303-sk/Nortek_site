services:
  - type: web
    name: nortek-backend
    env: node
    rootDir: backend
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true

  - type: web
    name: nortek-frontend
    env: static
    rootDir: frontend
    buildCommand: echo "No build step"
    staticPublishPath: public
    pullRequestPreviewsEnabled: true
    autoDeploy: true
